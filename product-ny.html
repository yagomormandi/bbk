<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conjunto New York - Bulk</title>

 
  <link rel="stylesheet" href="styles.css" />


  <link rel="stylesheet" href="product-ny.css" />
</head>
<body>

  <header class="prod-header">
    <div class="prod-container prod-header__inner">
      <a class="prod-back" href="index.html">← Volver</a>
      <div aria-hidden="true"></div>
    </div>
  </header>

  <main class="prod-container prod-grid">

    <section class="prod-gallery">
      <img src="images/ny.jpeg" alt="Conjunto New York" />
    </section>


    <section class="prod-details">
      <div class="prod-meta-top">
        <span class="prod-meta__item">+100 vendidos</span>
      </div>

      <h2 class="prod-title">Conjunto New York</h2>

      <div class="prod-price">$ 69.990</div>

      <div class="prod-cuotas">
        Cuota promocionada en 6 cuotas de <strong>$ 11.665</strong>
      </div>

      <a class="prod-link" href="https://www.mercadopago.com.ar/" target="_blank" rel="noopener">
        Ver los medios de pago
      </a>

      <div class="prod-spec">
        <div class="spec-row">
          <span class="spec-label">Color:</span>
          <span class="spec-value">Negro</span>
        </div>

        <div class="thumbs">
          <button class="thumb is-active" aria-label="Negro">
            <img src="images/ny.jpeg" alt="" />
          </button>

        </div>

        <div class="spec-row">
          <span class="spec-label">Talle:</span>
          <span class="spec-value">Elegí</span>
        </div>

        <div class="sizes">
          <button class="size">S</button>
          <button class="size is-active">M</button>
          <button class="size">L</button>
          <button class="size">XL</button>
           <button class="size">XXL</button>
        </div>

        <a class="prod-link" href="#" target="_blank" rel="noopener">Guía de talles</a>
      </div>

      <p class="prod-desc">
        Conjunto de algodón premium oversize. Suave, cómodo y urbano.
        Ideal para todos los días. 
      </p>


      <div class="prod-actions">
        <a class="btn-main" href="https://wa.me/5491123138736" target="_blank" rel="noopener">Comprar ahora</a>
        <a class="btn-main btn-secondary" href="index.html">Cerrar producto</a>
      </div>
    </section>
  </main>
</body>
</html>
